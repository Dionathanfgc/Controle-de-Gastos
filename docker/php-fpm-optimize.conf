# Otimizações de performance para PHP-FPM em produção

[www]
; Aumentar número de processos (safe para 512MB)
pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 10

; Timeout otimizado
request_terminate_timeout = 30s

; Melhorar uso de memória
pm.process_idle_timeout = 10s

; Log apenas de erros
log_level = warning
